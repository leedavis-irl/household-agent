# Deploy Iji to EC2 on push to main.
# Requires GitHub Secrets: EC2_SSH_KEY (private key for ubuntu@<DEPLOY_HOST>)
# On deploy failure after health check, rolls back to previous commit and notifies via Signal.
name: Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  DEPLOY_HOST: "100.124.0.46"
  DEPLOY_USER: "ubuntu"
  DEPLOY_DIR: "/home/ubuntu/household-agent"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Get rollback SHA
        id: rollback
        run: |
          sha=$(ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new "${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }}" \
            "cd ${{ env.DEPLOY_DIR }} && git rev-parse HEAD 2>/dev/null || echo none")
          echo "sha=$sha" >> $GITHUB_OUTPUT
          echo "Rollback SHA: $sha"

      - name: Deploy
        run: |
          ssh -i ~/.ssh/deploy_key "${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }}" "set -e; cd ${{ env.DEPLOY_DIR }}; git fetch origin main; git reset --hard origin/main; npm ci; sudo systemctl stop iji.service || true; sleep 15; sudo systemctl start iji.service"

      - name: Health check
        id: health
        run: |
          for i in 1 2 3 4 5 6; do
            response=$(ssh -i ~/.ssh/deploy_key "${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }}" \
              "curl -sf http://127.0.0.1:3001/health 2>/dev/null || echo FAIL")
            if echo "$response" | grep -q '"ok":true'; then
              echo "Smoke test passed: $response"
              exit 0
            fi
            echo "Attempt $i: $response, waiting 10s..."
            sleep 10
          done
          echo "Smoke test failed — service is not healthy"
          exit 1

      - name: Rollback on failure
        if: failure() && steps.rollback.outputs.sha != 'none' && steps.rollback.outputs.sha != ''
        run: |
          ssh -i ~/.ssh/deploy_key "${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }}" "set -e; cd ${{ env.DEPLOY_DIR }}; git reset --hard ${{ steps.rollback.outputs.sha }}; npm ci; sudo systemctl stop iji.service || true; sleep 15; sudo systemctl start iji.service"

