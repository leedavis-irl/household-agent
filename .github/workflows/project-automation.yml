name: Project Automation

on:
  issues:
    types: [closed]

jobs:
  move-to-done:
    runs-on: ubuntu-latest
    if: github.event.issue.state_reason == 'completed'
    steps:
      - name: Move project card to Done
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const projectId = 'PVT_kwHOAVcVpc4BSCAH';
            const statusFieldId = 'PVTSSF_lAHOAVcVpc4BSCAHzg_ryew';
            const doneOptionId = '94939777';

            // Find the project item for this issue
            const issueNodeId = context.payload.issue.node_id;

            const { data } = await github.graphql(`
              query($id: ID!) {
                node(id: $id) {
                  ... on Issue {
                    projectItems(first: 10) {
                      nodes {
                        id
                        project { id }
                      }
                    }
                  }
                }
              }
            `, { id: issueNodeId });

            const item = data.node.projectItems.nodes.find(n => n.project.id === projectId);
            if (!item) {
              console.log('Issue not in Ops project, skipping');
              return;
            }

            // Move to Done
            await github.graphql(`
              mutation($project: ID!, $item: ID!, $field: ID!, $value: String!) {
                updateProjectV2ItemFieldValue(input: {
                  projectId: $project,
                  itemId: $item,
                  fieldId: $field,
                  value: { singleSelectOptionId: $value }
                }) {
                  projectV2Item { id }
                }
              }
            `, {
              project: projectId,
              item: item.id,
              field: statusFieldId,
              value: doneOptionId
            });

            console.log(`Moved issue #${context.payload.issue.number} to Done in Ops project`);
